version: "3.9"

# ─────────────────────────────────────────────────────────
# Docker Swarm Stack — Cálculo de Corridas Backend
# Compatible with Portainer (stack deploy via UI or CLI)
# ─────────────────────────────────────────────────────────

x-app-env: &app-env
  APP_NAME: "${APP_NAME:-CalcCorridas}"
  APP_ENV: "${APP_ENV:-production}"
  APP_KEY: "${APP_KEY}"
  APP_DEBUG: "${APP_DEBUG:-false}"
  APP_URL: "${APP_URL}"
  LOG_CHANNEL: stderr
  LOG_LEVEL: "${LOG_LEVEL:-warning}"
  DB_CONNECTION: pgsql
  DB_HOST: postgres
  DB_PORT: "5432"
  DB_DATABASE: "${DB_DATABASE}"
  DB_USERNAME: "${DB_USERNAME}"
  DB_PASSWORD: "${DB_PASSWORD}"
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  REDIS_PASSWORD: "${REDIS_PASSWORD}"
  QUEUE_CONNECTION: redis
  CACHE_STORE: redis
  SESSION_DRIVER: redis
  SESSION_LIFETIME: "120"
  JWT_SECRET: "${JWT_SECRET}"
  JWT_ALGO: HS256
  JWT_TTL: "480"
  GOOGLE_PLAY_PACKAGE_NAME: "${GOOGLE_PLAY_PACKAGE_NAME}"
  GOOGLE_PLAY_PRODUCT_ID: "${GOOGLE_PLAY_PRODUCT_ID}"
  GOOGLE_SERVICE_ACCOUNT_JSON: "${GOOGLE_SERVICE_ACCOUNT_JSON}"
  RTDN_PUBSUB_TOKEN: "${RTDN_PUBSUB_TOKEN}"
  ADMIN_DEFAULT_EMAIL: "${ADMIN_DEFAULT_EMAIL}"
  ADMIN_DEFAULT_PASSWORD: "${ADMIN_DEFAULT_PASSWORD}"

services:

  # ── PHP-FPM application (3 replicas, rolling update) ──
  app:
    image: "registry.hostdatec.com.br/calc-corridas-app:${IMAGE_TAG:-latest}"
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    environment:
      <<: *app-env
    volumes:
      - storage_data:/var/www/html/storage/app
      - storage_logs:/var/www/html/storage/logs
    networks:
      - app_network
    deploy:
      mode: replicated
      replicas: 3
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        delay: 5s
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      resources:
        limits:
          cpus: "0.8"
          memory: 384M
        reservations:
          cpus: "0.25"
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 9000 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      - postgres
      - redis

  # ── Nginx reverse proxy (2 replicas) ──
  # Config embutido na imagem — sem Docker config externo.
  # Traefik é o único edge router (80/443); Nginx fica só na rede interna.
  nginx:
    image: "registry.hostdatec.com.br/calc-corridas-nginx:${IMAGE_TAG:-latest}"
    volumes:
      - storage_data:/var/www/html/storage/app:ro
    networks:
      - app_network
      - traefik_public
    deploy:
      mode: replicated
      replicas: 2
      update_config:
        parallelism: 1
        delay: 5s
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 3s
        max_attempts: 5
        window: 60s
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          cpus: "0.1"
          memory: 32M
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=traefik_public"

        # HTTPS — usa o wildcard *.hostdatec.com.br já gerado pelo container wildcard
        - "traefik.http.routers.calc-corridas.rule=Host(`${DOMAIN:-api.example.com}`)"
        - "traefik.http.routers.calc-corridas.entrypoints=websecure"
        - "traefik.http.routers.calc-corridas.tls=true"
        - "traefik.http.routers.calc-corridas.tls.certresolver=cloudflare"
        - "traefik.http.services.calc-corridas.loadbalancer.server.port=80"

        # HTTP → HTTPS redirect
        - "traefik.http.routers.calc-corridas-http.rule=Host(`${DOMAIN:-api.example.com}`)"
        - "traefik.http.routers.calc-corridas-http.entrypoints=web"
        - "traefik.http.routers.calc-corridas-http.middlewares=redirect-to-https"
        - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
        - "traefik.http.middlewares.redirect-to-https.redirectscheme.permanent=true"

  # ── PostgreSQL 16 (single, on manager node) ──
  postgres:
    image: "postgres:16-alpine"
    environment:
      POSTGRES_DB: "${DB_DATABASE}"
      POSTGRES_USER: "${DB_USERNAME}"
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      update_config:
        parallelism: 1
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
        window: 120s
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Redis 7 (single, on manager node) ──
  redis:
    image: "redis:7-alpine"
    command: >
      redis-server
      --requirepass "${REDIS_PASSWORD}"
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis_data:/data
    networks:
      - app_network
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      update_config:
        parallelism: 1
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 60s
      resources:
        limits:
          cpus: "0.5"
          memory: 320M
        reservations:
          cpus: "0.1"
          memory: 64M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Queue Worker — default + rtdn queues (2 replicas) ──
  queue-worker:
    image: "registry.hostdatec.com.br/calc-corridas-app:${IMAGE_TAG:-latest}"
    command: php artisan queue:work redis --queue=rtdn,default --sleep=3 --tries=3 --max-time=3600 --memory=128
    environment:
      <<: *app-env
    volumes:
      - storage_data:/var/www/html/storage/app
      - storage_logs:/var/www/html/storage/logs
    networks:
      - app_network
    deploy:
      mode: replicated
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 120s
      resources:
        limits:
          cpus: "0.5"
          memory: 192M
        reservations:
          cpus: "0.1"
          memory: 64M
    healthcheck:
      test: ["CMD-SHELL", "php artisan queue:monitor redis:default,rtdn 2>/dev/null || exit 0"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s
    depends_on:
      - postgres
      - redis

  # ── Scheduler (single) ──
  scheduler:
    image: "registry.hostdatec.com.br/calc-corridas-app:${IMAGE_TAG:-latest}"
    command: >
      sh -c "while true; do php artisan schedule:run --no-interaction >> /dev/null 2>&1; sleep 60; done"
    environment:
      <<: *app-env
    volumes:
      - storage_data:/var/www/html/storage/app
      - storage_logs:/var/www/html/storage/logs
    networks:
      - app_network
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 60s
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 32M
    depends_on:
      - postgres
      - redis

# ─────────────────────────────────────────────────────────
# Networks
# ─────────────────────────────────────────────────────────
networks:
  app_network:
    driver: overlay
    attachable: false
    driver_opts:
      encrypted: "true"
  traefik_public:
    external: true
    name: traefik_public

# ─────────────────────────────────────────────────────────
# Volumes
# ─────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: "${POSTGRES_DATA_PATH:-/opt/calc-corridas/postgres}"
  redis_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: "${REDIS_DATA_PATH:-/opt/calc-corridas/redis}"
  storage_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: "${STORAGE_DATA_PATH:-/opt/calc-corridas/storage}"
  storage_logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: "${STORAGE_LOGS_PATH:-/opt/calc-corridas/logs}"
